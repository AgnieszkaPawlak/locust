services:
  app:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: locust-demo-app
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped

  locust:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: locust-demo-runner
    command: locust -f locustfile.py --host=http://app:8000
    depends_on:
      - app
    ports:
      - "8089:8089"
    restart: unless-stopped
